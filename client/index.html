    <!-- ═══════════════════════════════════════════════════════════

    <!-- WebSite + SearchAction (Sitelinks Search Box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Plakr!",
      "alternateName": "Plakr! Bolões Esportivos",
      "url": "https://plakr.io/",
      "description": "Plataforma de bolões esportivos. Crie seu bolão da Copa do Mundo 2026 com a galera.",
      "inLanguage": "pt-BR",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://plakr.io/boloes?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Plakr!",
      "operatingSystem": "Web, iOS, Android",
      "applicationCategory": "SportsApplication",
      "applicationSubCategory": "Fantasy Sports",
      "description": "Crie bolões esportivos para qualquer campeonato. Palpites, ranking automático, conquistas e campeonatos personalizados. Gratuito para sempre, com plano Pro para organizadores avançados.",
      "url": "https://plakr.io/",
      "screenshot": "https://plakr.io/og-image.png",
      "inLanguage": "pt-BR",
      "offers": [
        {
          "@type": "Offer",
          "name": "Plakr! Gratuito",
          "price": "0",
          "priceCurrency": "BRL",
          "description": "Crie até 2 bolões, até 50 participantes por bolão. Gratuito para sempre."
        },
        {
          "@type": "Offer",
          "name": "Plakr! Pro",
          "price": "19.90",
          "priceCurrency": "BRL",
          "billingIncrement": "P1M",
          "description": "Bolões ilimitados, participantes ilimitados, campeonatos personalizados, regras customizadas e muito mais."
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1",
        "bestRating": "5",
        "worstRating": "1"
      }
    }
    </script>

    <!-- Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Plakr!",
      "url": "https://plakr.io/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://plakr.io/og-image.png",
        "width": 1200,
        "height": 630
      },
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": "Portuguese",
        "url": "https://plakr.io/"
      }
    }
    </script>

    <!-- FAQPage (Rich Results no Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "O Plakr! é gratuito?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim! O Plakr! é gratuito para sempre. No plano gratuito você pode criar até 2 bolões com até 50 participantes cada. Para bolões ilimitados e campeonatos personalizados, existe o plano Pro."
          }
        },
        {
          "@type": "Question",
          "name": "Posso criar um bolão da Copa do Mundo 2026 no Plakr!?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim! O Plakr! já tem a Copa do Mundo FIFA 2026 cadastrada. Basta criar seu bolão, escolher o campeonato e convidar seus amigos. Em menos de 2 minutos seu bolão está pronto."
          }
        },
        {
          "@type": "Question",
          "name": "O que é o campeonato personalizado do Plakr! Pro?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Com o Plakr! Pro você pode criar seu próprio campeonato do zero — define os times, as fases, as regras de pontuação e tudo mais. Ideal para campeonatos da empresa, do bairro, da família ou qualquer grupo."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona o ranking automático?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Após cada jogo, o Plakr! calcula automaticamente os pontos de cada participante com base nos palpites feitos. O ranking é atualizado em tempo real, sem precisar de nenhuma ação manual do organizador."
          }
        },
        {
          "@type": "Question",
          "name": "Quantos participantes podem entrar em um bolão?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No plano gratuito, cada bolão suporta até 50 participantes. Com o Plakr! Pro, o número de participantes é ilimitado."
          }
        },
        {
          "@type": "Question",
          "name": "Preciso instalar algum aplicativo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não! O Plakr! funciona diretamente no navegador do celular ou computador, sem precisar instalar nada. Basta acessar plakr.io e criar sua conta gratuitamente."
          }
        }
      ]
    }
    </script>
